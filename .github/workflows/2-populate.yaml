name: 2 - Populate Release
on:
    workflow_run:
        workflows: ["1 - Check Version and Create Pre-release"]
        types:
            - completed

    workflow_dispatch:
        inputs:
            release_tag:
                description: "Pre-release tag to populate (e.g. 2.75.0-dev-20240101120000)"
                required: true
                type: string

permissions:
    contents: write
    actions: read

jobs:
    setup:
        name: Install Dependencies and Download Game Files
        runs-on: windows-latest
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
        outputs:
            release_tag: ${{ steps.tag.outputs.release_tag }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download release tag artifact
              if: github.event_name == 'workflow_run'
              uses: actions/download-artifact@v4
              with:
                  name: release-tag
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set release tag
              id: tag
              shell: bash
              run: |
                  if [ "${{ github.event_name }}" = "workflow_run" ]; then
                    echo "release_tag=$(cat tag.txt)" >> $GITHUB_OUTPUT
                  else
                    echo "release_tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
                  fi

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 10.12.4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
                  cache-dependency-path: parser/pnpm-lock.yaml

            - name: Install parser dependencies
              working-directory: ./parser
              run: pnpm install --frozen-lockfile

            - name: Download data bundles
              run: >
                  npx cytrus-v6 download --game dofus --release dofus3 --output parser/temp-data/
                  --select **/StreamingAssets/Content/Data/**/*.bundle
                  --select **/StreamingAssets/Content/I18n/*.bin

            - name: Download game binaries
              run: >
                  npx cytrus-v6 download --game dofus --release dofus3 --output parser/temp-binaries/
                  --select **/GameAssembly.dll
                  --select **/global-metadata.dat

            - name: Download map bundles
              run: >
                  npx cytrus-v6 download --game dofus --release dofus3 --output parser/temp-maps/
                  --select **/StreamingAssets/Content/Map/Data/**/*.bundle

            - name: Upload data-files artifact
              uses: actions/upload-artifact@v4
              with:
                  name: data-files
                  path: parser/temp-data/
                  retention-days: 1

            - name: Upload game-binaries artifact
              uses: actions/upload-artifact@v4
              with:
                  name: game-binaries
                  path: parser/temp-binaries/
                  retention-days: 1

            - name: Upload map-bundles artifact
              uses: actions/upload-artifact@v4
              with:
                  name: map-bundles
                  path: parser/temp-maps/
                  retention-days: 1

    populate-data:
        name: Extract and Upload Data
        needs: setup
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: "7"

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 10.12.4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
                  cache-dependency-path: parser/pnpm-lock.yaml

            - name: Install parser dependencies
              working-directory: ./parser
              run: pnpm install --frozen-lockfile

            - name: Download data-files artifact
              uses: actions/download-artifact@v4
              with:
                  name: data-files
                  path: parser/temp/

            - name: Parse files to JSON
              working-directory: ./parser
              run: pnpm extract
              env:
                  INPUT_FOLDER: temp/
                  OUTPUT_FOLDER: json/

            - name: Update database
              working-directory: ./parser
              run: pnpm db
              env:
                  DATABASE_URL: ./dofus.sqlite
                  JSON_FOLDER: json/

            - name: Upload assets to pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: pwsh
              run: |
                  $tag = "v${{ needs.setup.outputs.release_tag }}"
                  $files = Get-ChildItem -Path "parser/json" -File
                  foreach ($file in $files) {
                      gh release upload $tag $file.FullName
                  }
                  gh release upload $tag parser/dofus.sqlite

    il2cpp-proto:
        name: Generate Proto
        needs: setup
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: "7"

            - name: Download game-binaries artifact
              uses: actions/download-artifact@v4
              with:
                  name: game-binaries
                  path: parser/temp/

            - name: Run Il2CppDumper
              shell: pwsh
              run: .\Il2CppDumper\Il2CppDumper.exe .\parser\temp\GameAssembly.dll .\parser\temp\Dofus_Data\il2cpp_data\Metadata\global-metadata.dat

            - name: Run protodec
              run: .\Il2CppDumper\protodec.exe .\Il2CppDumper\DummyDll .\parser\dofus.proto --include-properties-without-non-user-code-attribute

            - name: Upload proto to pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload "v${{ needs.setup.outputs.release_tag }}" parser/dofus.proto

    populate-maps:
        name: Extract and Upload Maps
        needs: setup
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 10.12.4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
                  cache-dependency-path: parser/pnpm-lock.yaml

            - name: Install parser dependencies
              working-directory: ./parser
              run: pnpm install --frozen-lockfile

            - name: Download map-bundles artifact
              uses: actions/download-artifact@v4
              with:
                  name: map-bundles
                  path: parser/temp/

            - name: Parse map bundles and create maps.sqlite
              working-directory: ./parser
              run: pnpm extract
              env:
                  INPUT_FOLDER: temp/
                  OUTPUT_FOLDER: json/
                  MAP_INTERACTIONS_DB: maps.sqlite

            - name: Upload maps.sqlite to pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: pwsh
              run: |
                  $tag = "v${{ needs.setup.outputs.release_tag }}"
                  gh release upload $tag parser/maps.sqlite
