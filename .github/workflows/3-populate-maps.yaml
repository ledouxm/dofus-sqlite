name: 3 - Populate Maps (maps.sqlite)
on:
    workflow_run:
        workflows: ["1 - Check Version and Create Pre-release"]
        types:
            - completed

    workflow_dispatch:
        inputs:
            release_tag:
                description: "Pre-release tag to populate (e.g. 2.75.0-dev-20240101120000)"
                required: true
                type: string

permissions:
    contents: write
    actions: read

jobs:
    populate-maps:
        name: Extract and Upload Maps
        runs-on: windows-latest
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download release tag artifact
              if: github.event_name == 'workflow_run'
              uses: actions/download-artifact@v4
              with:
                  name: release-tag
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set release tag from artifact
              if: github.event_name == 'workflow_run'
              shell: bash
              run: echo "RELEASE_TAG=$(cat tag.txt)" >> $GITHUB_ENV

            - name: Set release tag from input
              if: github.event_name == 'workflow_dispatch'
              shell: bash
              run: echo "RELEASE_TAG=${{ inputs.release_tag }}" >> $GITHUB_ENV

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: "7"

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - name: Cache npm global and pnpm dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ${{ env.APPDATA }}\npm-cache
                      ${{ env.HOME }}/.npm
                      parser/node_modules
                      ${{ github.workspace }}/.pnpm-store
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('parser/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-

            - name: Install cytrus-v6
              run: npm i -g cytrus-v6

            - name: Install dependencies
              working-directory: ./parser
              run: |
                  Remove-Item -Force pnpm-lock.yaml -ErrorAction SilentlyContinue
                  pnpm install
              shell: pwsh

            - name: Extract map bundles with cytrus
              working-directory: ./parser
              run: >
                  cytrus-v6 download --game dofus --release dofus3 --output temp/
                  --select **/StreamingAssets/Content/Map/Data/**/*.bundle

            - name: Parse map bundles and create maps.sqlite
              working-directory: ./parser
              run: pnpm extract
              env:
                  INPUT_FOLDER: temp/
                  OUTPUT_FOLDER: json/
                  MAP_INTERACTIONS_DB: maps.sqlite

            - name: Upload maps.sqlite to pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: pwsh
              run: |
                  $tag = "v$env:RELEASE_TAG"
                  gh release upload $tag parser/maps.sqlite
